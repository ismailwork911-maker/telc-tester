// ===================== HELPERS =====================
function getCorrectAnswer(exam,key){
  const m=key.match(/^(lv|sb|hv)(\d)_(\d+)$/);if(!m)return null;
  const[,type,teil,numStr]=m;const num=parseInt(numStr);
  const sec=SECTIONS.find(s=>s.id===type+teil);if(!sec)return null;
  const data=exam[sec.category][sec.part];if(!data)return null;
  if(type==='lv'&&teil==='1')return data.answers[num-1];
  if(type==='lv'&&teil==='2'){const q=data.questions.find(qq=>qq.num===num);return q?q.answer:null;}
  if(type==='lv'&&teil==='3'){const idx=data.situations.findIndex(s=>s.num===num);return data.answers[idx];}
  if(type==='sb'&&teil==='1'){const q=data.questions.find(qq=>qq.num===num);return q?q.answer:null;}
  if(type==='sb'&&teil==='2'){const idx=data.questions.findIndex(qq=>qq.num===num);return data.answers[idx];}
  if(type==='hv'){const idx=data.questions.findIndex(qq=>qq.num===num);return data.answers[idx];}
  return null;
}
function calcScores(exam,answers){
  const scores={};let total=0;
  SECTIONS.forEach(sec=>{const sc=SCORING[sec.id];const data=exam[sec.category][sec.part];let correct=0;
    const nums=sec.id==='lv1'?Array.from({length:5},(_,i)=>i+1):sec.id==='lv3'?data.situations.map(s=>s.num):data.questions.map(q=>q.num);
    nums.forEach(num=>{const key=`${sec.id}_${num}`;if(answers[key]&&answers[key]===getCorrectAnswer(exam,key))correct++;});
    const pts=correct*sc.points;scores[sec.id]={correct,total:sc.count,points:pts,max:sc.count*sc.points};total+=pts;});
  const writtenMax=225;const testedMax=180;const saMax=45;const passMark=Math.ceil(writtenMax*0.6);
  return{scores,total,testedMax,writtenMax,saMax,passMark,pct:(total/testedMax*100).toFixed(1),pass:total>=Math.ceil(testedMax*0.6)};
}

const OptionBtn=({label,text,selected,correct,wrong,disabled,onClick,compact})=>{
  let bg='transparent',border='var(--border)',color='var(--text)';
  if(correct){bg='var(--green-bg)';border='var(--green)';color='var(--green)';}
  else if(wrong){bg='var(--red-bg)';border='var(--red)';color='var(--red)';}
  else if(selected){bg='var(--accent-glow)';border='var(--accent)';color='var(--accent2)';}
  return(<button disabled={disabled} onClick={onClick} style={{display:'flex',alignItems:'center',gap:12,padding:compact?'8px 14px':'12px 16px',borderRadius:10,border:`2px solid ${border}`,background:bg,color,fontSize:'.9rem',textAlign:'left',transition:'all .15s',width:compact?'auto':'100%',opacity:disabled&&!correct&&!wrong&&!selected?0.5:1}}>
    <span style={{width:28,height:28,borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'.8rem',fontWeight:700,flexShrink:0,background:correct?'var(--green)':wrong?'var(--red)':selected?'var(--accent)':'var(--surface3)',color:(correct||wrong||selected)?'#fff':'var(--text2)'}}>{label}</span>
    {text&&<span>{text}</span>}
  </button>);
};

  {data.situations.map((sit,i)=>{const key=`lv3_${sit.num}`,ans=answers[key],correct=getCorrectAnswer(exam,key),rc=!submitted?'':ans===correct?'correct':'wrong';
    return(<QuestionCard key={key} num={sit.num} text={sit.text} resultClass={rc}>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>{data.options.map(opt=><OptionBtn key={opt} label={opt} selected={ans===opt} correct={submitted&&opt===correct} wrong={submitted&&ans===opt&&opt!==correct} disabled={submitted} onClick={()=>onAnswer(key,opt)} compact/>)}</div>
      {submitted&&ans!==correct&&<div style={{marginTop:8,fontSize:'.82rem',color:'var(--green)'}}>Richtig: {correct}</div>}
    </QuestionCard>);})}
</div>);

const SB1=({data,answers,submitted,onAnswer,exam})=>(<div className="fade-in">
  <ReadingBox title="L\u00fcckentext">{data.readingText.split('\n').map((p,i)=>p?<p key={i} style={{marginBottom:8}}>{p}</p>:<br key={i}/>)}</ReadingBox>
  {data.questions.map(q=>{const key=`sb1_${q.num}`,ans=answers[key],correct=getCorrectAnswer(exam,key),labels=['a','b','c'],rc=!submitted?'':ans===correct?'correct':'wrong';
    return(<QuestionCard key={key} num={q.num} text={`L\u00fccke (${q.num})`} resultClass={rc}>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>{q.options.map((opt,j)=>{const v=labels[j];return<OptionBtn key={v} label={v} text={opt} selected={ans===v} correct={submitted&&v===correct} wrong={submitted&&ans===v&&v!==correct} disabled={submitted} onClick={()=>onAnswer(key,v)}/>;})}</div>
      {submitted&&ans!==correct&&<div style={{marginTop:8,fontSize:'.82rem',color:'var(--green)'}}>Richtig: {correct}) {q.options[labels.indexOf(correct)]}</div>}
    </QuestionCard>);})}
</div>);

const SB2=({data,answers,submitted,onAnswer,exam})=>(<div className="fade-in">
  <ReadingBox title="L\u00fcckentext">
    {data.readingText.split('\n').map((p,i)=>p?<p key={i} style={{marginBottom:8}}>{p}</p>:<br key={i}/>)}
    {data.wordBank&&<div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:16,padding:'14px',background:'rgba(255,255,255,0.03)',borderRadius:10}}>
      {data.wordBank.map((w,i)=><span key={i} style={{padding:'4px 12px',borderRadius:8,background:'var(--surface3)',fontSize:'.83rem',fontWeight:500}}><strong style={{color:'var(--accent2)'}}>{String.fromCharCode(65+i)}</strong> {w}</span>)}
    </div>}
  </ReadingBox>
  {data.questions.map((q,i)=>{const key=`sb2_${q.num}`,ans=answers[key],correct=getCorrectAnswer(exam,key),rc=!submitted?'':ans===correct?'correct':'wrong';
    return(<QuestionCard key={key} num={q.num} text={`L\u00fccke (${q.num})`} resultClass={rc}>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>{data.options.map(opt=><OptionBtn key={opt} label={opt} selected={ans===opt} correct={submitted&&opt===correct} wrong={submitted&&ans===opt&&opt!==correct} disabled={submitted} onClick={()=>onAnswer(key,opt)} compact/>)}</div>
      {submitted&&ans!==correct&&<div style={{marginTop:8,fontSize:'.82rem',color:'var(--green)'}}>Richtig: {correct} ({data.answerWords?data.answerWords[i]:''})</div>}
    </QuestionCard>);})}
</div>);

const HV=({data,sectionId,answers,submitted,onAnswer,exam})=>(<div className="fade-in">
  {data.note&&<NoteBox>{'\uD83C\uDFA7'} {data.note}</NoteBox>}
  <p style={{color:'var(--text2)',marginBottom:16,fontSize:'.88rem'}}>{data.instructions}</p>
  {data.questions.map((q,i)=>{const key=`${sectionId}_${q.num}`,ans=answers[key],correct=getCorrectAnswer(exam,key),rc=!submitted?'':ans===correct?'correct':'wrong';
    return(<QuestionCard key={key} num={q.num} text={q.text} resultClass={rc}>
      <div style={{display:'flex',gap:10}}>{['+','-'].map(v=><TFBtn key={v} label={v==='+'?'+ Richtig':'\u2212 Falsch'} value={v} selected={ans===v} correct={submitted&&v===correct} wrong={submitted&&ans===v&&v!==correct} disabled={submitted} onClick={()=>onAnswer(key,v)}/>)}</div>
      {submitted&&ans!==correct&&<div style={{marginTop:8,fontSize:'.82rem',color:'var(--green)'}}>Richtig: {correct==='+'?'Richtig (+)':'Falsch (\u2212)'}</div>}
    </QuestionCard>);})}
</div>);

// ===== RESULTS MODAL =====
const Results=({exam,answers,onClose,onRestart})=>{
  const{scores,total,testedMax,writtenMax,saMax,passMark,pct,pass}=calcScores(exam,answers);
  const lvPts=(scores.lv1?.points||0)+(scores.lv2?.points||0)+(scores.lv3?.points||0);
  const sbPts=(scores.sb1?.points||0)+(scores.sb2?.points||0);
  const hvPts=(scores.hv1?.points||0)+(scores.hv2?.points||0)+(scores.hv3?.points||0);
  const rows=[
    {label:'Leseverstehen 1',s:scores.lv1},{label:'Leseverstehen 2',s:scores.lv2},{label:'Leseverstehen 3',s:scores.lv3},
    {label:'Lesen gesamt',s:{points:lvPts,max:75},sub:true},
    {label:'Sprachbausteine 1',s:scores.sb1},{label:'Sprachbausteine 2',s:scores.sb2},
    {label:'Sprache gesamt',s:{points:sbPts,max:30},sub:true},
    {label:'H\u00f6rverstehen 1',s:scores.hv1},{label:'H\u00f6rverstehen 2',s:scores.hv2},{label:'H\u00f6rverstehen 3',s:scores.hv3},
    {label:'H\u00f6ren gesamt',s:{points:hvPts,max:75},sub:true},
  ];
  return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(8px)',zIndex:200,display:'flex',alignItems:'flex-start',justifyContent:'center',overflowY:'auto',padding:20}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface)',borderRadius:20,padding:'40px 36px',maxWidth:560,width:'100%',marginTop:40,border:'1px solid var(--border)',animation:'slideUp .4s ease'}}>
      <h2 style={{textAlign:'center',fontSize:'1.5rem',fontWeight:800,marginBottom:28}}>Ergebnis</h2>
      <div style={{width:160,height:160,borderRadius:'50%',margin:'0 auto 24px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:pass?'var(--green-bg)':'var(--red-bg)',border:`4px solid ${pass?'var(--green)':'var(--red)'}`,animation:'pulse .6s ease'}}>
        <span style={{fontSize:'2.2rem',fontWeight:800,color:pass?'var(--green)':'var(--red)'}}>{total}</span>
        <span style={{fontSize:'.78rem',color:'var(--text2)'}}>/ {testedMax} getestet</span>
        <span style={{fontSize:'.85rem',fontWeight:600,color:pass?'var(--green)':'var(--red)'}}>{pct}%</span>
      </div>
      <div style={{textAlign:'center',padding:'14px',borderRadius:10,fontWeight:700,marginBottom:12,background:pass?'var(--green-bg)':'var(--red-bg)',color:pass?'var(--green)':'var(--red)'}}>
        {pass?'Bestanden! (\u226560%)':'Nicht bestanden (mind. 60% n\u00f6tig)'}
      </div>
      <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px',marginBottom:20,fontSize:'.82rem',color:'var(--text2)',lineHeight:1.7}}>
        <div style={{fontWeight:600,color:'var(--text)',marginBottom:6}}>Telc B1 Bewertung (Schriftlich)</div>
        <div>Schriftliche Pr\u00fcfung gesamt: <strong style={{color:'var(--text)'}}>225 Punkte</strong></div>
        <div>\u2022 Getestet (LV + SB + HV): <strong style={{color:'var(--accent2)'}}>{total} / {testedMax}</strong></div>
        <div>\u2022 Schriftl. Ausdruck (nicht getestet): <span style={{color:'var(--yellow)'}}>0 / {saMax}</span></div>
        <div>\u2022 M\u00fcndliche Pr\u00fcfung (75 Pkt.): <span style={{color:'var(--yellow)'}}>nicht enthalten</span></div>
        <div style={{marginTop:6,borderTop:'1px solid var(--border)',paddingTop:6}}>Bestehen: mind. <strong style={{color:'var(--text)'}}>{passMark} / {writtenMax}</strong> schriftlich (60%) + mind. <strong style={{color:'var(--text)'}}>45 / 75</strong> m\u00fcndlich (60%)</div>
      </div>
      <div style={{marginBottom:24}}>
        {rows.map((r,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:r.sub?'8px 10px':'8px 0',borderBottom:r.sub?'2px solid var(--border)':'1px solid rgba(255,255,255,0.04)',fontWeight:r.sub?700:400,fontSize:'.88rem',background:r.sub?'rgba(108,92,231,0.05)':'transparent',borderRadius:r.sub?6:0,marginBottom:r.sub?8:0}}>
          <span>{r.label}</span>
          <span style={{display:'flex',gap:20}}>
            {r.s.correct!==undefined&&<span style={{color:'var(--text2)'}}>{r.s.correct}/{r.s.total}</span>}
            <span style={{minWidth:70,textAlign:'right',fontWeight:600}}>{r.s.points} / {r.s.max}</span>
          </span>
        </div>))}
        <div style={{display:'flex',justifyContent:'space-between',padding:'12px 0',fontWeight:800,fontSize:'1rem',borderTop:'2px solid var(--accent)',marginTop:8}}>
          <span>Getestet</span><span>{total} / {testedMax}</span>
        </div>
      </div>
      <div style={{display:'flex',gap:12,justifyContent:'center'}}>
        <button onClick={onClose} style={{padding:'12px 28px',borderRadius:10,background:'var(--accent)',color:'#fff',fontWeight:700,fontSize:'.9rem'}}>Antworten ansehen</button>
        <button onClick={onRestart} style={{padding:'12px 28px',borderRadius:10,background:'transparent',color:'var(--accent2)',fontWeight:700,fontSize:'.9rem',border:'2px solid var(--accent)'}}>Neuer Test</button>
      </div>
    </div>
  </div>);
};

// ===== START SCREEN =====
const StartScreen=({onStart})=>(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 20px'}} className="fade-in">
  <div style={{textAlign:'center',marginBottom:48}}>
    <div style={{fontSize:'3.5rem',marginBottom:16,filter:'drop-shadow(0 0 30px rgba(108,92,231,0.4))'}}>{'\uD83C\uDDE9\uD83C\uDDEA'}</div>
    <h1 style={{fontSize:'2.4rem',fontWeight:800,background:'linear-gradient(135deg,var(--accent2),var(--accent),#fd79a8)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:8}}>Telc Tester</h1>
    <p style={{color:'var(--text2)',fontSize:'1.05rem',maxWidth:400}}>W\u00e4hle einen \u00dcbungstest und simuliere die schriftliche Pr\u00fcfung.</p>
  </div>
  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16,maxWidth:860,width:'100%'}}>
    {EXAMS.map(exam=>(<button key={exam.id} onClick={()=>onStart(exam.id)} style={{background:'linear-gradient(145deg,rgba(108,92,231,0.08),rgba(108,92,231,0.02))',border:'1px solid rgba(108,92,231,0.2)',borderRadius:16,padding:'28px 24px',textAlign:'left',color:'var(--text)',transition:'all .25s',cursor:'pointer'}}>
      <div style={{fontSize:'1.1rem',fontWeight:700,marginBottom:6}}>{exam.title}</div>
      <div style={{fontSize:'.85rem',color:'var(--text2)',marginBottom:12}}>{exam.subtitle}</div>
      <div style={{display:'flex',gap:8}}>
        <span style={{fontSize:'.75rem',padding:'3px 10px',borderRadius:12,background:'var(--accent-glow)',color:'var(--accent2)'}}>60 Fragen</span>
        <span style={{fontSize:'.75rem',padding:'3px 10px',borderRadius:12,background:'var(--accent-glow)',color:'var(--accent2)'}}>225 Pkt. schriftl.</span>
      </div>
    </button>))}
  </div>
</div>);

// ===== MAIN APP =====
const App=()=>{
  const[examId,setExamId]=useState(null);
  const[section,setSection]=useState('lv1');
  const[answers,setAnswers]=useState({});
  const[submitted,setSubmitted]=useState(false);
  const[showResults,setShowResults]=useState(false);
  const mainRef=useRef(null);
  const exam=useMemo(()=>EXAMS.find(e=>e.id===examId),[examId]);
  const startExam=useCallback(id=>{setExamId(id);setSection('lv1');setAnswers({});setSubmitted(false);setShowResults(false);},[]);
  const goHome=useCallback(()=>{setExamId(null);setSubmitted(false);setShowResults(false);setAnswers({});},[]);
  const onAnswer=useCallback((key,val)=>{if(submitted)return;setAnswers(prev=>({...prev,[key]:val}));},[submitted]);
  const navigateTo=useCallback(id=>{setSection(id);window.scrollTo(0,0);},[]);
  const totalAnswered=Object.keys(answers).length;const totalQuestions=60;const progressPct=(totalAnswered/totalQuestions*100).toFixed(0);
  const submitExam=()=>{if(totalAnswered<totalQuestions&&!confirm(`Nur ${totalAnswered} von ${totalQuestions} beantwortet. Trotzdem abgeben?`))return;setSubmitted(true);setShowResults(true);};

  if(!exam)return<StartScreen onStart={startExam}/>;
  const sec=SECTIONS.find(s=>s.id===section);const data=exam[sec.category][sec.part];
  const sectionCounts={};
  SECTIONS.forEach(s=>{const sc=SCORING[s.id];const d=exam[s.category][s.part];let count=0;
    const nums=s.id==='lv1'?Array.from({length:5},(_,i)=>i+1):s.id==='lv3'?d.situations.map(x=>x.num):d.questions.map(x=>x.num);
    nums.forEach(n=>{if(answers[`${s.id}_${n}`]!==undefined)count++;});sectionCounts[s.id]={answered:count,total:sc.count};});

  return(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
    <header style={{background:'linear-gradient(135deg,rgba(108,92,231,0.15),rgba(108,92,231,0.05))',borderBottom:'1px solid var(--border)',padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10,position:'sticky',top:0,zIndex:100,backdropFilter:'blur(16px)'}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <button onClick={goHome} style={{background:'var(--surface3)',color:'var(--text)',padding:'6px 14px',borderRadius:8,fontSize:'.82rem',fontWeight:600}}>{'\u2190'} Zur\u00fcck</button>
        <div><div style={{fontWeight:700,fontSize:'1.05rem'}}>{exam.title}</div><div style={{fontSize:'.8rem',color:'var(--text2)'}}>{exam.subtitle}</div></div>
      </div>
      {!submitted?<button onClick={submitExam} style={{background:'linear-gradient(135deg,var(--accent),#8b5cf6)',color:'#fff',padding:'10px 24px',borderRadius:10,fontWeight:700,fontSize:'.9rem',boxShadow:'0 4px 16px rgba(108,92,231,0.3)'}}>Pr\u00fcfung abgeben</button>
      :<button onClick={()=>setShowResults(true)} style={{background:'var(--green)',color:'#fff',padding:'10px 24px',borderRadius:10,fontWeight:700,fontSize:'.9rem'}}>Ergebnis</button>}
    </header>

    <nav style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'8px 16px',overflowX:'auto',whiteSpace:'nowrap',display:'flex',gap:6,position:'sticky',top:55,zIndex:99}}>
      {SECTIONS.map(s=>{const c=sectionCounts[s.id];const active=s.id===section;const complete=c.answered===c.total;
        return(<button key={s.id} onClick={()=>navigateTo(s.id)} style={{padding:'8px 14px',borderRadius:10,fontSize:'.82rem',fontWeight:600,background:active?'var(--accent)':'transparent',color:active?'#fff':'var(--text2)',border:active?'none':'1px solid transparent',transition:'all .2s',display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>
          <span>{s.icon}</span><span>{s.label}</span>
          <span style={{fontSize:'.7rem',padding:'2px 7px',borderRadius:8,background:complete?'var(--green)':active?'rgba(255,255,255,0.2)':'var(--surface3)',color:complete?'#fff':'var(--text2)'}}>{c.answered}/{c.total}</span>
        </button>);})}
    </nav>

    <div style={{height:3,background:'var(--surface3)'}}><div style={{height:'100%',background:'linear-gradient(90deg,var(--accent),var(--accent2))',width:`${progressPct}%`,transition:'width .3s',borderRadius:2}}/></div>

    <main ref={mainRef} style={{flex:1,maxWidth:800,margin:'0 auto',width:'100%',padding:'24px 20px 100px'}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:'1.3rem',fontWeight:700,color:'var(--accent2)'}}>{sec.fullLabel}</h2>
        <p style={{fontSize:'.82rem',color:'var(--text2)',marginTop:4}}>{totalAnswered} / {totalQuestions} beantwortet</p>
      </div>
      {section==='lv1'&&<LV1 data={data} answers={answers} submitted={submitted} onAnswer={onAnswer} exam={exam}/>}
      {section==='lv2'&&<LV2 data={data} answers={answers} submitted={submitted} onAnswer={onAnswer} exam={exam}/>}
      {section==='lv3'&&<LV3 data={data} answers={answers} submitted={submitted} onAnswer={onAnswer} exam={exam}/>}
      {section==='sb1'&&<SB1 data={data} answers={answers} submitted={submitted} onAnswer={onAnswer} exam={exam}/>}
      {section==='sb2'&&<SB2 data={data} answers={answers} submitted={submitted} onAnswer={onAnswer} exam={exam}/>}
      {section.startsWith('hv')&&<HV data={data} sectionId={section} answers={answers} submitted={submitted} onAnswer={onAnswer} exam={exam}/>}

      <div style={{display:'flex',justifyContent:'space-between',marginTop:32,paddingTop:20,borderTop:'1px solid var(--border)'}}>
        {SECTIONS.indexOf(sec)>0?<button onClick={()=>navigateTo(SECTIONS[SECTIONS.indexOf(sec)-1].id)} style={{padding:'10px 20px',borderRadius:10,background:'var(--surface3)',color:'var(--text)',fontWeight:600,fontSize:'.88rem'}}>{'\u2190'} {SECTIONS[SECTIONS.indexOf(sec)-1].label}</button>:<div/>}
        {SECTIONS.indexOf(sec)<SECTIONS.length-1?<button onClick={()=>navigateTo(SECTIONS[SECTIONS.indexOf(sec)+1].id)} style={{padding:'10px 20px',borderRadius:10,background:'var(--accent)',color:'#fff',fontWeight:600,fontSize:'.88rem'}}>{SECTIONS[SECTIONS.indexOf(sec)+1].label} {'\u2192'}</button>
        :!submitted?<button onClick={submitExam} style={{padding:'10px 20px',borderRadius:10,background:'linear-gradient(135deg,var(--accent),#8b5cf6)',color:'#fff',fontWeight:600,fontSize:'.88rem'}}>Pr\u00fcfung abgeben</button>:<div/>}
      </div>
    </main>
    {showResults&&<Results exam={exam} answers={answers} onClose={()=>setShowResults(false)} onRestart={goHome}/>}
  </div>);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
